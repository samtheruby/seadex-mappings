name: auto-merge-bot-pr

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: |
      startsWith(github.head_ref, 'bot/ingest-') &&
      github.event.pull_request.user.login == 'samtheruby'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Merge bot PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --squash --auto \
            --repo "${{ github.repository }}"
