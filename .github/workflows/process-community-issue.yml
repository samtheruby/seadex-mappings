name: process-community-issue

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: community-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  process:
    if: |
      github.event.label.name == 'approved' &&
      contains(github.event.issue.labels.*.name, 'community-release')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Process issue
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python3 scripts/process_community_issue.py

      - name: Commit result
        run: |
          git config user.name "seadex-community-bot"
          git config user.email "bot@seadex-mappings"
          git add community/
          if git diff --cached --quiet; then
            echo "Nothing to commit (entry may already exist)"
          else
            git commit -m "community: add release from issue #${{ github.event.issue.number }}"
            git push
          fi

      - name: Post result comment
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let msg;
            try {
              msg = fs.readFileSync('/tmp/community_result.txt', 'utf8');
            } catch {
              msg = '❌ Processing failed — check the workflow run for details.';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: msg,
            });

      - name: Close issue on success
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
